<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Zeta Clicker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 20px;
            max-width: 400px;
            width: 100%;
        }
        .duck {
            font-size: 120px;
            cursor: pointer;
            transition: transform 0.1s;
            margin: 20px 0;
        }
        .duck:active {
            transform: scale(0.95);
        }
        .stats {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .stat {
            font-size: 20px;
            margin: 10px 0;
        }
        .stat span {
            color: #ffd700;
            font-weight: bold;
        }
        button {
            background: #667eea;
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦆 Zeta Clicker</h1>
        <div class="stats">
            <div class="stat">💰 Клики: <span id="clicks">{{ clicks }}</span></div>
            <div class="stat">🏆 Уровень: <span id="level">{{ level }}</span></div>
            <div class="stat">💪 Сила: +<span id="tapPower">{{ tap_power }}</span></div>
        </div>
        <div class="duck" id="duck">🦆</div>
        <button onclick="tg.close()">✖️ Закрыть</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        const userId = new URLSearchParams(window.location.search).get('user_id') || 1;
        let clicks = parseInt('{{ clicks }}');
        let level = parseInt('{{ level }}');
        let tapPower = parseInt('{{ tap_power }}');
        
        const clicksSpan = document.getElementById('clicks');
        const levelSpan = document.getElementById('level');
        const tapPowerSpan = document.getElementById('tapPower');
        
        function updateUI() {
            clicksSpan.textContent = clicks;
            levelSpan.textContent = level;
            tapPowerSpan.textContent = tapPower;
        }
        
        const duck = document.getElementById('duck');
        duck.addEventListener('click', async () => {
            clicks += tapPower;
            updateUI();
            
            try {
                const response = await fetch('/api/click', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({user_id: userId, clicks: tapPower})
                });
                const data = await response.json();
                clicks = data.clicks;
                level = data.level;
                tapPower = data.tap_power;
                updateUI();
            } catch(e) {
                console.error('Error:', e);
            }
        });
        
        updateUI();
    </script>
</body>
</html>
