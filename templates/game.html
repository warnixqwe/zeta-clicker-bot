<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Zeta Clicker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <h1>🦆 Zeta Clicker</h1>
    <p>User ID: <span id="userId">{{ user_id }}</span></p>
    <p>Clicks: <span id="clicks">{{ clicks }}</span></p>
    <p>Level: <span id="level">{{ level }}</span></p>
    <p>Tap Power: +<span id="tapPower">{{ tap_power }}</span></p>
    <p>Skin: <span id="skin">{{ skin }}</span></p>
    <button onclick="clickDuck()">Click!</button>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        
        let clicks = {{ clicks }};
        let level = {{ level }};
        let tapPower = {{ tap_power }};
        const userId = {{ user_id }};
        
        function updateUI() {
            document.getElementById('clicks').innerText = clicks;
            document.getElementById('level').innerText = level;
            document.getElementById('tapPower').innerText = tapPower;
        }
        
        async function clickDuck() {
            clicks += tapPower;
            updateUI();
            
            try {
                const response = await fetch('/api/click', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({user_id: userId, clicks: tapPower})
                });
                const data = await response.json();
                clicks = data.clicks;
                level = data.level;
                tapPower = data.tap_power;
                updateUI();
            } catch(e) {
                console.error(e);
            }
        }
        
        updateUI();
    </script>
</body>
</html>
