<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Zeta Clicker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 16px;
            padding-bottom: 80px;
        }

        /* Табы навигации */
        .nav-tabs {
            display: flex;
            background: rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 5px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: white;
            font-size: 14px;
            font-weight: 600;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        /* Карточки */
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stats-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            color: white;
        }
        .stats-value {
            color: #ffd700;
            font-weight: bold;
            font-size: 20px;
        }
        .duck {
            font-size: 150px;
            cursor: pointer;
            text-align: center;
            transition: transform 0.1s;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }
        .duck:active { transform: scale(0.95); }
        .energy-bar {
            width: 100%;
            height: 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        .energy-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00cc66);
            transition: width 0.2s;
        }
        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }
        button:active { transform: scale(0.97); }
        .skin-item, .upgrade-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            color: white;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            animation: fadeOut 2s forwards;
            z-index: 1000;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        .tap-value {
            position: fixed;
            pointer-events: none;
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
            animation: floatUp 0.6s forwards;
            z-index: 1000;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(0.8); }
            100% { opacity: 0; transform: translateY(-100px) scale(1.3); }
        }
    </style>
</head>
<body>
    <div class="nav-tabs">
        <button class="tab-btn active" data-tab="main">🦆 Игра</button>
        <button class="tab-btn" data-tab="profile">📊 Профиль</button>
        <button class="tab-btn" data-tab="shop">👕 Магазин</button>
        <button class="tab-btn" data-tab="upgrades">💎 Прокачка</button>
        <button class="tab-btn" data-tab="quests">📋 Задания</button>
        <button class="tab-btn" data-tab="leaderboard">🏆 Топ</button>
        <button class="tab-btn" data-tab="friends">👥 Друзья</button>
    </div>
        <!-- Вкладка: Игра -->
    <div id="tab-main" class="tab-content active">
        <div class="card">
            <div class="stats-row"><span>🦆 Уровень</span><span class="stats-value" id="level">1</span></div>
            <div class="stats-row"><span>💰 Клики</span><span class="stats-value" id="clicks">0</span></div>
            <div class="stats-row"><span>💪 Сила клика</span><span class="stats-value" id="tapPower">+1</span></div>
            <div class="stats-row"><span>⚡ Пассивный доход</span><span class="stats-value" id="passiveIncome">0/час</span></div>
        </div>
        <div class="duck" id="duck">🦆</div>
        <div class="energy-bar"><div class="energy-fill" id="energyFill" style="width:100%"></div></div>
        <button onclick="collectPassive()">💰 Собрать пассивный доход</button>
        <button onclick="claimDaily()">🎁 Ежедневный бонус</button>
    </div>
        <!-- Вкладка: Профиль -->
    <div id="tab-profile" class="tab-content">
        <div class="card">
            <div class="stats-row"><span>🆔 ID</span><span class="stats-value" id="profileUserId">-</span></div>
            <div class="stats-row"><span>🦆 Скин</span><span class="stats-value" id="profileSkin">🦆</span></div>
            <div class="stats-row"><span>📊 Всего кликов</span><span class="stats-value" id="totalClicks">0</span></div>
            <div class="stats-row"><span>📅 Серия входов</span><span class="stats-value" id="dailyStreak">0</span></div>
            <div class="stats-row"><span>⭐ Премиум</span><span class="stats-value" id="premiumStatus">Нет</span></div>
        </div>
    </div>
        <!-- Вкладка: Магазин -->
    <div id="tab-shop" class="tab-content">
        <div class="card">
            <div id="skinsList">Загрузка...</div>
        </div>
    </div>
        <!-- Вкладка: Прокачка -->
    <div id="tab-upgrades" class="tab-content">
        <div class="card">
            <div id="upgradesList">Загрузка...</div>
        </div>
    </div>
        <!-- Вкладка: Задания -->
    <div id="tab-quests" class="tab-content">
        <div class="card">
            <div id="questsList">Загрузка...</div>
        </div>
    </div>
        <!-- Вкладка: Лидерборд -->
    <div id="tab-leaderboard" class="tab-content">
        <div class="card">
            <div id="leaderboardList">Загрузка...</div>
        </div>
    </div>
        <!-- Вкладка: Друзья -->
    <div id="tab-friends" class="tab-content">
        <div class="card">
            <div class="stats-row"><span>👥 Приглашено друзей</span><span class="stats-value" id="referralCount">0</span></div>
            <div class="stats-row"><span>🎁 Награда за друга</span><span class="stats-value">1000 кликов</span></div>
            <button onclick="shareReferralLink()">🔗 Пригласить друга</button>
            <button onclick="claimReferralReward()">🎁 Забрать награду</button>
            <div id="referralLink" style="margin-top:10px; font-size:12px; color:#aaa; word-break:break-all;"></div>
        </div>
    </div>
        <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.enableClosingConfirmation();

        let userId = new URLSearchParams(window.location.search).get('user_id') || 1;
        let clicks = 0, level = 1, tapPower = 1, passiveIncome = 0, totalClicks = 0, dailyStreak = 0, premium = false;
        let energy = 1000, maxEnergy = 1000;
        let userSkins = [], currentSkin = '🦆';
        let regenInterval = null;

        // Загрузка всех данных
        async function loadAllData() {
            try {
                const res = await fetch(`/api/stats/${userId}`);
                const data = await res.json();
                clicks = data.clicks || 0;
                level = data.level || 1;
                tapPower = data.tap_power || 1;
                passiveIncome = data.passive_income || 0;
                totalClicks = data.total_clicks || 0;
                dailyStreak = data.daily_streak || 0;
                currentSkin = data.current_skin || '🦆';
                premium = data.premium || false;
                userSkins = data.user_skins || [];
                updateUI();
            } catch(e) { console.error(e); }
        }

        // Обновление интерфейса
        function updateUI() {
            document.getElementById('clicks').innerText = clicks;
            document.getElementById('level').innerText = level;
            document.getElementById('tapPower').innerText = '+' + tapPower;
            document.getElementById('passiveIncome').innerText = passiveIncome + '/час';
            document.getElementById('energyFill').style.width = (energy/maxEnergy)*100 + '%';
            document.getElementById('profileUserId').innerText = userId;
            document.getElementById('profileSkin').innerText = currentSkin;
            document.getElementById('totalClicks').innerText = totalClicks;
            document.getElementById('dailyStreak').innerText = dailyStreak;
            document.getElementById('premiumStatus').innerText = premium ? 'Активен' : 'Нет';
            document.getElementById('duck').innerHTML = currentSkin;
            loadSkins();
            loadUpgrades();
            loadQuests();
            loadLeaderboard();
            loadReferralInfo();
        }

        // Клик
        document.getElementById('duck').addEventListener('click', async (e) => {
            if (energy <= 0) { showToast('😫 Нет энергии!'); return; }
            energy = Math.max(0, energy - 1);
            updateUI();
            const rect = e.target.getBoundingClientRect();
            showTapValue(rect.left + rect.width/2, rect.top, tapPower);
            try {
                const res = await fetch('/api/click', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, clicks: tapPower })
                });
                const data = await res.json();
                clicks = data.clicks;
                level = data.level;
                tapPower = data.tap_power;
                totalClicks = data.total_clicks;
                updateUI();
            } catch(e) { console.error(e); }
            if (energy < maxEnergy && !regenInterval) startEnergyRegen();
        });

        function showTapValue(x, y, value) {
            const div = document.createElement('div');
            div.className = 'tap-value';
            div.textContent = `+${value}`;
            div.style.left = (x - 30) + 'px';
            div.style.top = (y - 40) + 'px';
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 600);
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function startEnergyRegen() {
            if (regenInterval) clearInterval(regenInterval);
            regenInterval = setInterval(() => {
                if (energy < maxEnergy) {
                    energy = Math.min(energy + 5, maxEnergy);
                    updateUI();
                } else { clearInterval(regenInterval); regenInterval = null; }
            }, 1000);
        }

        async function collectPassive() {
            try {
                const res = await fetch('/api/collect_passive', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user_id: userId }) });
                const data = await res.json();
                if (data.earned > 0) { clicks = data.clicks; showToast(`💰 +${data.earned} кликов!`); updateUI(); }
                else showToast('😴 Накоплений нет');
            } catch(e) { console.error(e); }
        }

        async function claimDaily() {
            try {
                const res = await fetch('/api/daily', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user_id: userId }) });
                const data = await res.json();
                if (data.bonus > 0) { clicks = data.clicks; dailyStreak = data.streak; showToast(`🎁 +${data.bonus} кликов! Серия: ${data.streak}`); updateUI(); }
                else showToast('🎁 Уже забирал сегодня!');
            } catch(e) { console.error(e); }
        }

        async function loadSkins() {
            try {
                const res = await fetch(`/api/skins/${userId}`);
                const skins = await res.json();
                let html = '';
                for (let s of skins) {
                    let btn = s.owned ? (s.equipped ? '✅ Экипирован' : `<button onclick="equipSkin(${s.id})">👕 Экипировать</button>`) : `<button onclick="buySkin(${s.id}, ${s.price})">💰 Купить за ${s.price}</button>`;
                    html += `<div class="skin-item"><span>${s.emoji} ${s.name} ${s.owned ? '' : `(+${s.bonus} к силе)`}</span>${btn}</div>`;
                }
                document.getElementById('skinsList').innerHTML = html;
            } catch(e) { console.error(e); }
        }

        async function buySkin(id, price) {
            if (clicks < price) { showToast('❌ Не хватает кликов!'); return; }
            const res = await fetch('/api/buy_skin', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user_id: userId, skin_id: id }) });
            const data = await res.json();
            if (data.success) { clicks = data.clicks; userSkins = data.user_skins; showToast('✅ Скин куплен!'); loadSkins(); updateUI(); }
            else showToast('❌ Ошибка');
        }

        async function equipSkin(id) {
            const res = await fetch('/api/equip_skin', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user_id: userId, skin_id: id }) });
            const data = await res.json();
            if (data.success) { currentSkin = data.skin; showToast('✅ Скин экипирован!'); updateUI(); loadSkins(); }
        }

        async function loadUpgrades() {
            const res = await fetch(`/api/upgrades/${userId}`);
            const data = await res.json();
            document.getElementById('upgradesList').innerHTML = `
                <div class="upgrade-item"><span>💪 Сила тапа: +${tapPower}</span><button onclick="upgradeTap()">Улучшить (${data.tap_price} кликов)</button></div>
                <div class="upgrade-item"><span>⚡ Энергия: ${energy}/${maxEnergy}</span><button onclick="upgradeEnergy()">Улучшить (${data.energy_price} кликов)</button></div>
                <div class="upgrade-item"><span>💰 Пассивный доход: +${passiveIncome}/час</span><button onclick="upgradePassive()">Улучшить (${data.passive_price} кликов)</button></div>
                <div class="upgrade-item"><span>⭐ Премиум</span><button onclick="buyPremium()">${premium ? 'Активен' : 'Купить за 5000 кликов (30 дней)'}</button></div>
            `;
        }

        async function upgradeTap() { await upgradeAction('/api/upgrade_tap', 'tap_power'); }
        async function upgradeEnergy() { await upgradeAction('/api/upgrade_energy', 'energy'); }
        async function upgradePassive() { await upgradeAction('/api/upgrade_passive', 'passive_income'); }
        async function upgradeAction(url, field) {
            const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user_id: userId }) });
            const data = await res.json();
            if (data.success) { showToast('✅ Улучшено!'); clicks = data.clicks; if(field==='tap_power') tapPower = data.new_value; if(field==='energy') maxEnergy = data.new_value; if(field==='passive_income') passiveIncome = data.new_value; updateUI(); loadUpgrades(); }
            else showToast(`❌ Нужно ${data.price} кликов`);
        }

        async function buyPremium() {
            const res = await fetch('/api/buy_premium', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user_id: userId }) });
            const data = await res.json();
            if (data.success) { clicks = data.clicks; premium = true; showToast('⭐ Премиум активирован!'); updateUI(); loadUpgrades(); }
            else showToast('❌ Не хватает кликов!');
        }

        async function loadQuests() {
            const res = await fetch(`/api/quests/${userId}`);
            const quests = await res.json();
            let html = '';
            for (let q of quests) {
                let status = q.completed ? '✅ Выполнено' : `🔄 ${q.progress}/${q.target}`;
                html += `<div class="upgrade-item"><span>📋 ${q.name}<br><small>${q.description}</small><br><small>Награда: +${q.reward}</small></span><span>${status}</span></div>`;
            }
            document.getElementById('questsList').innerHTML = html;
        }

        async function loadLeaderboard() {
            const res = await fetch(`/api/leaderboard`);
            const users = await res.json();
            let html = '';
            for (let i=0; i<users.length; i++) {
                html += `<div class="leaderboard-item"><span>${i+1}. ${users[i].user_id}</span><span>💰 ${users[i].total_clicks}</span></div>`;
            }
            document.getElementById('leaderboardList').innerHTML = html || 'Пока никого нет';
        }

        async function loadReferralInfo() {
            const res = await fetch(`/api/referrals/${userId}`);
            const data = await res.json();
            document.getElementById('referralCount').innerText = data.count;
            const link = `https://t.me/${tg.initDataUnsafe.user?.username ? tg.initDataUnsafe.user.username : 'ZetaClickerRobot'}?start=ref_${userId}`;
            document.getElementById('referralLink').innerHTML = `🔗 <a href="${link}" target="_blank">${link}</a>`;
        }

        async function shareReferralLink() {
            const link = `https://t.me/share/url?url=https://t.me/ZetaClickerRobot?start=ref_${userId}&text=🦆 Играй в Zeta Clicker и получай бонусы!`;
            tg.openTelegramLink(link);
        }

        async function claimReferralReward() {
            const res = await fetch('/api/claim_referral', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user_id: userId }) });
            const data = await res.json();
            if (data.reward > 0) { clicks = data.clicks; showToast(`🎉 +${data.reward} кликов!`); updateUI(); loadReferralInfo(); }
            else showToast('😢 Нет новых рефералов');
        }

        // Табы
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
            });
        });

        if (energy < maxEnergy) startEnergyRegen();
        loadAllData();
    </script>
</body>
</html>
